[licenses]
allow = [
  "MIT",
  "CC0-1.0",
  "ISC",
  "OpenSSL",
  "Unlicense",
  "BSD-2-Clause",
  "BSD-2-Clause-Patent",
  "BSD-3-Clause",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "Zlib",
  "Unicode-DFS-2016",
  "Unicode-3.0",
]
unused-allowed-license = "allow"

# barkus is a DataDog-internal project whose crates do not yet declare a
# license field.  The repo itself is MIT-licensed (see its LICENSE file).
[[licenses.clarify]]
name = "barkus-core"
expression = "MIT"
license-files = []

[[licenses.clarify]]
name = "barkus-ebnf"
expression = "MIT"
license-files = []

[[licenses.clarify]]
name = "barkus-peg"
expression = "MIT"
license-files = []

[[licenses.clarify]]
name = "barkus-antlr"
expression = "MIT"
license-files = []

[[licenses.clarify]]
name = "barkus-parser-common"
expression = "MIT"
license-files = []

[sources]
unknown-git = "deny"
allow-git = ["https://github.com/DataDog/saluki", "https://github.com/DataDog/barkus"]

[advisories]
version = 2
ignore = [
  "RUSTSEC-2024-0436", # paste is unmaintained
]

[bans]
multiple-versions = "allow"
