generator:
  - kubernetes:
      manifest:
        namespace: |
          apiVersion: v1
          kind: Namespace
          metadata:
            name: foobar
  - kubernetes:
      manifest:
        pod: |
          apiVersion: v1
          kind: Pod
          metadata:
            namespace: foobar
          spec:
            containers:
              - name: sleep
                image: busybox
                command:
                  - sleep
                  - infinity
      number_of_exemplars: 2
  - kubernetes:
      manifest:
        deployment: |
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            namespace: foobar
            name: foo
          spec:
            replicas: 2
            selector:
              matchLabels:
                app: foo
            template:
              metadata:
                labels:
                  app: foo
              spec:
                containers:
                  - name: sleep
                    image: busybox
                    command:
                      - sleep
                      - infinity
      number_of_exemplars: 2
