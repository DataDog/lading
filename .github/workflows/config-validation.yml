name: Config Validation

on:
  pull_request:
    paths:
      - 'examples/**/*.yaml'
      - 'examples/**/*.yml'
      - 'lading/**'
      - '.github/workflows/config-validation.yml'
      - 'ci/config-validation'
  push:
    branches:
      - main
    paths:
      - 'examples/**/*.yaml'
      - 'examples/**/*.yml'
      - 'lading/**'
      - '.github/workflows/config-validation.yml'
      - 'ci/config-validation'

jobs:
  validate-configs:
    name: Validate Example Configs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: actions-rust-lang/setup-rust-toolchain@ac90e63697ac2784f4ecfe2964e1a285c304003a # v1.14.1
        with:
          cache: true
      - uses: taiki-e/install-action@d6912b47771be2c443ec90dbb3d28e023987e782 # v2.44.60
        with:
          tool: nextest@0.9.72
      - name: Install Protobuf
        uses: ./.github/actions/install-protobuf
      - name: Install FUSE
        uses: ./.github/actions/install-fuse
      - name: Run config validation
        run: ./ci/config-validation