name: Config Validation

on:
  pull_request:
    paths:
      - 'examples/**/*.yaml'
      - 'examples/**/*.yml'
      - 'lading/**'
      - '.github/workflows/config-validation.yml'
      - 'ci/config-validation'
  push:
    branches:
      - main
    paths:
      - 'examples/**/*.yaml'
      - 'examples/**/*.yml'
      - 'lading/**'
      - '.github/workflows/config-validation.yml'
      - 'ci/config-validation'

jobs:
  validate-configs:
    name: Validate Example Configs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions-rust-lang/setup-rust-toolchain@a0b538fa0b742a6aa35d6e2c169b4bd06d225a98 # v1.15.3
        with:
          cache: true
      - uses: taiki-e/install-action@650c5ca14212efbbf3e580844b04bdccf68dac31 # v2.67.18
        with:
          tool: nextest@0.9.72
      - name: Install Protobuf
        uses: ./.github/actions/install-protobuf
      - name: Install FUSE
        uses: ./.github/actions/install-fuse
      - name: Run config validation
        run: ./ci/config-validation
