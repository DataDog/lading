apiVersion: datadoghq.com/v2alpha1
kind: DatadogAgent
metadata:
  name: datadog
  namespace: default
spec:
  global:
    clusterName: lading-test
    site: datadoghq.com
    credentials:
      apiSecret:
        secretName: datadog-secret
        keyName: api-key
    endpoint:
      url: http://lading-intake:8080

  features:
    apm:
      enabled: true

    logCollection:
      enabled: true

    dogstatsd:
      hostPortConfig:
        enabled: true
        hostPort: 8125

    npm:
      enabled: true

    prometheusScrape:
      enabled: true
      enableServiceEndpoints: true

  override:
    clusterAgent:
      containers:
        cluster-agent:
          livenessProbe:
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 10
          readinessProbe:
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 10
    nodeAgent:
      image:
        name: gcr.io/datadoghq/agent:7.72.1
      extraConfd:
        configMap:
          name: agent-logs-config
      containers:
        agent:
          env:
            - name: DD_HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: DD_TAGS
              value: "{{ DD_TAGS }}"
            - name: DD_DOGSTATSD_NON_LOCAL_TRAFFIC
              value: "true"
            - name: DD_BIND_HOST
              value: "0.0.0.0"
            - name: DD_DOGSTATSD_PORT
              value: "8125"
            - name: DD_DOGSTATSD_TELEMETRY_ENABLED
              value: "false"
            - name: DD_LOGS_CONFIG_LOGS_DD_URL
              value: "lading-intake:8080"
            - name: DD_LOGS_CONFIG_USE_HTTP
              value: "true"
            - name: DD_LOGS_CONFIG_LOGS_NO_SSL
              value: "true"
          resources:
            limits:
              memory: "{{ AGENT_MEMORY_MB }}Mi"
          volumeMounts:
            - name: lading-logs
              mountPath: /var/log/lading
              readOnly: true
        trace-agent:
          resources:
            limits:
              memory: "{{ TRACE_MEMORY_MB }}Mi"
        system-probe:
          resources:
            limits:
              memory: "{{ SYSPROBE_MEMORY_MB }}Mi"
        process-agent:
          resources:
            limits:
              memory: "{{ PROCESS_MEMORY_MB }}Mi"
      volumes:
        - name: lading-logs
          hostPath:
            path: /var/log/lading
            type: DirectoryOrCreate
---
# Log collection configuration for the agent
apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-logs-config
  namespace: default
data:
  lading.yaml: |
    logs:
      - type: file
        path: /var/log/lading/*.log
        service: lading-logrotate
        source: lading
