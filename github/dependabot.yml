version: 2
updates:
- package-ecosystem: cargo
  directory: /
  schedule:
    interval: daily
  labels:
  - dependencies
  - github_actions
  - no-changelog
  cooldown:
    default-days: 14
- package-ecosystem: github-actions
  directory: /
  schedule:
    interval: weekly
  labels:
  - dependencies
  - github_actions
  - no-changelog
  cooldown:
    default-days: 14
